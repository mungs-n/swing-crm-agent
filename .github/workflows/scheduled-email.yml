name: 예약 이메일 자동 발송

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 받기
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install sendgrid pandas

      - name: 예약 발송 체크 & 실행
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python scheduled_sender.py

      - name: 발송 이력 / 예약 상태 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/campaign_history.csv ]; then git add -f data/campaign_history.csv; fi
          if [ -f data/campaign_schedule.json ]; then git add -f data/campaign_schedule.json; fi
          if ! git diff --staged --quiet; then
            git commit -m "🤖 자동 발송 이력 업데이트"
            git push
          else
            echo "커밋할 변경사항 없음, 건너뜀"
          fi
